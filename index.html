<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dialer App - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .dialer-card { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="dialer-card">
    <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-blue-600">Create Profile 📞</h1>
        <p class="text-gray-500">Register to start calling online</p>
    </div>

    <form id="regForm" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Full Name</label>
            <input type="text" id="userName" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter your name">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Mobile Number</label>
            <input type="tel" id="userPhone" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="+88017XXXXXXXX">
        </div>

        <button type="submit" id="regBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition duration-300">
            Register & Start Calling
        </button>
    </form>

    <div id="statusMsg" class="mt-4 text-center hidden"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // আপনার Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCjObx6UjbHXaMRnoZa2TcSAhsIcvgFnEY",
        authDomain: "dailer-482b0.firebaseapp.com",
        projectId: "dailer-482b0",
        storageBucket: "dailer-482b0.firebasestorage.app",
        messagingSenderId: "952901214213",
        appId: "1:952901214213:web:2e0bab40a14b0796f57c6c"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const regForm = document.getElementById('regForm');
    const statusMsg = document.getElementById('statusMsg');

    regForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('userName').value;
        const phone = document.getElementById('userPhone').value;
        const btn = document.getElementById('regBtn');

        btn.disabled = true;
        btn.innerText = "Registering...";

        try {
            // Firestore-এ 'users' কালেকশনে ডাটা সেভ করা
            await setDoc(doc(db, "users", phone), {
                name: name,
                phone: phone,
                status: "online",
                createdAt: new Date()
            });

            statusMsg.className = "mt-4 text-center text-green-600 font-medium";
            statusMsg.innerHTML = "Success! Profile created. Redirecting...";
            statusMsg.classList.remove('hidden');

            // ৩ সেকেন্ড পর ডায়ালার পেজে পাঠিয়ে দিবে (যদি আপনার থাকে)
            setTimeout(() => {
                window.location.href = "dialer.html"; 
            }, 2000);

        } catch (error) {
            console.error("Error adding document: ", error);
            statusMsg.className = "mt-4 text-center text-red-600 font-medium";
            statusMsg.innerHTML = "Error! Something went wrong.";
            statusMsg.classList.remove('hidden');
            btn.disabled = false;
            btn.innerText = "Register & Start Calling";
        }
    });
</script>

</body>
</html>
