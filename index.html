<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dialer Pad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .numpad-btn { @apply w-16 h-16 flex flex-col items-center justify-center rounded-full bg-gray-200 text-2xl font-semibold hover:bg-gray-300 active:scale-90 transition; }
        #sidebar { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-white h-screen flex flex-col items-center justify-between py-10 relative overflow-hidden">

    <div class="w-full max-w-xs flex justify-end px-4 absolute top-5">
        <button id="menuBtn" class="text-2xl text-gray-600 p-2"><i class="fas fa-ellipsis-v"></i></button>
    </div>

    <div class="mt-16 text-center">
        <input type="text" id="display" readonly class="text-4xl font-light tracking-widest text-gray-800 bg-transparent text-center border-none outline-none w-full mb-2" placeholder="Dialing...">
        <p id="contactName" class="text-blue-500 h-6">New Number</p>
    </div>

    <div class="grid grid-cols-3 gap-6 mb-10">
        <button class="numpad-btn" onclick="press('1')">1 <span class="text-[10px] text-gray-500">o_o</span></button>
        <button class="numpad-btn" onclick="press('2')">2 <span class="text-[10px] text-gray-500">ABC</span></button>
        <button class="numpad-btn" onclick="press('3')">3 <span class="text-[10px] text-gray-500">DEF</span></button>
        <button class="numpad-btn" onclick="press('4')">4 <span class="text-[10px] text-gray-500">GHI</span></button>
        <button class="numpad-btn" onclick="press('5')">5 <span class="text-[10px] text-gray-500">JKL</span></button>
        <button class="numpad-btn" onclick="press('6')">6 <span class="text-[10px] text-gray-500">MNO</span></button>
        <button class="numpad-btn" onclick="press('7')">7 <span class="text-[10px] text-gray-500">PQRS</span></button>
        <button class="numpad-btn" onclick="press('8')">8 <span class="text-[10px] text-gray-500">TUV</span></button>
        <button class="numpad-btn" onclick="press('9')">9 <span class="text-[10px] text-gray-500">WXYZ</span></button>
        <button class="numpad-btn" onclick="press('*')">*</button>
        <button class="numpad-btn" onclick="press('0')">0 <span class="text-[10px] text-gray-500">+</span></button>
        <button class="numpad-btn" onclick="press('#')">#</button>
    </div>

    <div class="flex items-center gap-10 mb-8">
        <button onclick="clearLast()" class="text-gray-400 text-xl"><i class="fas fa-backspace"></i></button>
        <button id="callBtn" class="w-16 h-16 bg-green-500 text-white rounded-full flex items-center justify-center text-2xl shadow-lg hover:bg-green-600 active:scale-95 transition">
            <i class="fas fa-phone"></i>
        </button>
        <div class="w-5"></div> </div>

    <div id="sidebar" class="fixed top-0 right-0 h-full w-64 bg-white shadow-2xl translate-x-full z-50 p-6">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-bold">Profile</h2>
            <button id="closeBtn" class="text-gray-500"><i class="fas fa-times"></i></button>
        </div>
        <div class="text-center">
            <div class="w-24 h-24 bg-blue-100 rounded-full mx-auto flex items-center justify-center text-blue-500 text-4xl mb-4">
                <i class="fas fa-user-circle"></i>
            </div>
            <h3 id="profName" class="text-lg font-semibold">User Name</h3>
            <p id="profPhone" class="text-gray-500 mb-6">+000 000000</p>
            <button onclick="logout()" class="w-full bg-red-50 text-red-600 py-2 rounded-lg hover:bg-red-100 transition">Logout</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const sidebar = document.getElementById('sidebar');

        function press(num) {
            display.value += num;
        }

        function clearLast() {
            display.value = display.value.slice(0, -1);
        }

        // Sidebar Logic
        document.getElementById('menuBtn').onclick = () => sidebar.classList.remove('translate-x-full');
        document.getElementById('closeBtn').onclick = () => sidebar.classList.add('translate-x-full');

        // Load Profile
        window.onload = () => {
            const name = localStorage.getItem("userName");
            const phone = localStorage.getItem("userPhone");
            if(!phone) window.location.href = "login.html";
            
            document.getElementById('profName').innerText = name;
            document.getElementById('profPhone').innerText = phone;
        };

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
