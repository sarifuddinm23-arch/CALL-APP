<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Call App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #e3e6ed; display: flex; justify-content: center; align-items: center; height: 100vh; }

        /* Phone Container (Desktop mode frame) */
        .phone-container { 
            width: 360px; 
            height: 680px; 
            background: #fff; 
            border-radius: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
            border: 10px solid #222; 
            overflow: hidden; 
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Fast Login Overlay */
        #login-screen {
            position: absolute; width: 100%; height: 100%; background: white; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        #login-screen input { 
            width: 80%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; text-align: center;
        }
        #login-screen button {
            width: 80%; padding: 15px; background: #4CAF50; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
        }

        /* Header Style */
        .header { 
            padding: 15px; display: flex; justify-content: space-between; align-items: center; 
            background: #fff; border-bottom: 1px solid #f0f0f0;
        }
        .profile-icon { width: 35px; height: 35px; background: #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .app-title { font-weight: bold; color: #333; font-size: 0.9rem; }

        /* Dialer UI */
        #number-display { 
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; font-size: 2.5rem; color: #222; height: 150px;
        }
        .keypad { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px 40px; background: #fafafa; border-radius: 30px 30px 0 0;
        }
        .key { 
            width: 70px; height: 70px; border-radius: 50%; border: none; background: #eee; 
            font-size: 1.5rem; cursor: pointer; transition: 0.2s; 
        }
        .key:active { background: #ccc; transform: scale(0.9); }
        .call-btn-container { padding: 10px 40px 30px; background: #fafafa; display: flex; justify-content: center; }
        .call-btn { 
            width: 70px; height: 70px; background: #4CAF50; border: none; border-radius: 50%; 
            color: white; font-size: 1.5rem; cursor: pointer; box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        /* For Mobile Phones */
        @media (max-width: 400px) {
            .phone-container { width: 100vw; height: 100vh; border: none; border-radius: 0; }
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div id="login-screen">
        <h2 style="margin-bottom: 20px;">Welcome</h2>
        <input type="number" id="login-mobile" placeholder="Enter Mobile Number">
        <button onclick="handleLogin()">LOGIN</button>
    </div>

    <div class="header">
        <div class="profile-icon">👤</div>
        <div class="app-title">WIFI CALL APP</div>
        <div style="width: 35px;"></div> </div>

    <div id="number-display">0</div>

    <div class="keypad">
        <button class="key" onclick="press('1')">1</button>
        <button class="key" onclick="press('2')">2</button>
        <button class="key" onclick="press('3')">3</button>
        <button class="key" onclick="press('4')">4</button>
        <button class="key" onclick="press('5')">5</button>
        <button class="key" onclick="press('6')">6</button>
        <button class="key" onclick="press('7')">7</button>
        <button class="key" onclick="press('8')">8</button>
        <button class="key" onclick="press('9')">9</button>
        <button class="key" onclick="press('*')">*</button>
        <button class="key" onclick="press('0')">0</button>
        <button class="key" onclick="press('#')">#</button>
    </div>
    <div class="call-btn-container">
        <button class="call-btn" onclick="makeCall()">📞</button>
    </div>
</div>

<script>
    // Supabase Configuration
    const SUPABASE_URL = 'https://bqsmlubhwvmjlyowctqy.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxc21sdWJod3Ztamx5b3djdHF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NTk5NzIsImV4cCI6MjA4ODQzNTk3Mn0.rYvhWAZOhc1ZNAOJJ-DvThkCsLOCveqzXmDrZS_hdQk';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentNumber = "";
    let myNumber = localStorage.getItem('my_number');

    // Auto-Login Check
    if (myNumber) {
        document.getElementById('login-screen').style.display = 'none';
        updateStatus('online');
    }

    async function handleLogin() {
        const num = document.getElementById('login-mobile').value;
        if (num.length < 10) return alert("Enter valid number");
        
        myNumber = num;
        localStorage.setItem('my_number', num);
        
        // Save to Supabase
        await _supabase.from('profiles').upsert({ mobile_number: num, status: 'online' });
        
        document.getElementById('login-screen').style.display = 'none';
    }

    function press(num) {
        if (currentNumber === "0") currentNumber = "";
        currentNumber += num;
        document.getElementById('number-display').innerText = currentNumber;
    }

    async function makeCall() {
        if (!currentNumber) return alert("Dial a number first");

        // Check Receiver Status
        const { data, error } = await _supabase
            .from('profiles')
            .select('status')
            .eq('mobile_number', currentNumber)
            .single();

        if (data && data.status === 'online') {
            alert("Ringing " + currentNumber + "...");
            // WebRTC Logic starts here
        } else {
            alert("User is offline. Missed call logged.");
            await _supabase.from('missed_calls').insert([
                { from_user: myNumber, to_user: currentNumber }
            ]);
        }
        
        currentNumber = "";
        document.getElementById('number-display').innerText = "0";
    }

    async function updateStatus(status) {
        if (myNumber) {
            await _supabase.from('profiles').update({ status: status }).eq('mobile_number', myNumber);
        }
    }

    // Go offline on close
    window.addEventListener('beforeunload', () => updateStatus('offline'));

</script>
</body>
</html>
