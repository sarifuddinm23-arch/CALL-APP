<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dialer App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm">
    <div class="text-center mb-6">
        <h2 class="text-3xl font-bold text-blue-600">Welcome 👋</h2>
        <p class="text-gray-500">Enter your details to start</p>
    </div>

    <form id="loginForm" class="space-y-4">
        <input type="text" id="name" placeholder="Full Name" required class="w-full px-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400">
        <input type="tel" id="phone" placeholder="Mobile Number" required class="w-full px-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400">
        
        <button type="submit" id="loginBtn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold shadow-lg hover:bg-blue-700 transition">
            Login / Register
        </button>
    </form>
    <p id="msg" class="text-center mt-4 text-sm hidden"></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCjObx6UjbHXaMRnoZa2TcSAhsIcvgFnEY",
        authDomain: "dailer-482b0.firebaseapp.com",
        projectId: "dailer-482b0",
        storageBucket: "dailer-482b0.firebasestorage.app",
        messagingSenderId: "952901214213",
        appId: "1:952901214213:web:2e0bab40a14b0796f57c6c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const msg = document.getElementById('msg');

        try {
            await setDoc(doc(db, "users", phone), { name, phone, status: "online" });
            localStorage.setItem("userPhone", phone);
            localStorage.setItem("userName", name);
            
            msg.innerText = "Redirecting...";
            msg.className = "text-center mt-4 text-green-600 block";
            setTimeout(() => window.location.href = "index.html", 1000);
        } catch (err) {
            msg.innerText = "Error saving data!";
            msg.className = "text-center mt-4 text-red-600 block";
        }
    });
</script>
</body>
</html>
